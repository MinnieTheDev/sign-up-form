<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- <div class="left-panel">
            <img src="/images/leaves.avif" alt="Nanzen-ji Bridges" class="bg">
            <img src="/images/odin-lined.png" alt="Odin Logo">
        </div> -->
        <div class="right-panel">
            <h2>This is not a real online service! You know you need something like this in your life to help you realise your deepest dreams. Sign up now to get started.</h2>
            <h2>You know you want to.</h2>
            <form>
                <h2>Let's do this!</h2>
                <div>
                    <div>
                        <label for="first-name">First name</label>
                        <input type="text" name="first-name" id="first-name">
                    </div>
                    <div>
                        <label for="last-name">Last name</label>
                        <input type="text" name="last-name" id="last-name">
                    </div>
                </div>
                <div>
                    <div>
                        <label for="mail">Email</label>
                        <input type="email" name="mail" id="mail">
                    </div>
                    <div>
                        <label for="contact-number">Phone number</label>
                        <input type="tel" name="contact-number" id="contact-number">
                    </div>
                </div>
                <div>
                    <div>
                        <label for="pwd">Password</label>
                        <input type="password" name="pwd" id="pwd">
                    </div>
                    <div>
                        <label for="confirm-pwd">Confirm Password</label>
                        <input type="password" name="confirm-pwd" id="confirm-pwd">
                    </div>
                </div>
                <div>
                    <button type="submit">Create Account</button>
                </div>
                <div>Already have an account?<a href="">Log in</a></div>
            </form>
        </div>
    </div>
</body>
</html>
